name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/jma-proxy/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/jma-proxy
    env:
      HAS_CLOUDFLARE_SECRETS: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Cloudflare secrets
        if: env.HAS_CLOUDFLARE_SECRETS != 'true'
        run: |
          echo "::warning::CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is not set. Skipping deploy."
          echo "Set these secrets in Settings → Secrets → Actions to enable deployment."

      - uses: actions/setup-node@v4
        if: env.HAS_CLOUDFLARE_SECRETS == 'true'
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        if: env.HAS_CLOUDFLARE_SECRETS == 'true'
        run: npm install

      - name: Deploy to Cloudflare Workers
        if: env.HAS_CLOUDFLARE_SECRETS == 'true'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
