name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── WASM ビルド（1回だけ、artifact で後続に配布） ──────────
  wasm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-wasm
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: wasm/**/pkg
          retention-days: 1

  # ── Gate 1: 高速ゲート（lint + format + build + guard テスト） ──
  fast-gate:
    needs: wasm-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: wasm

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check & Build
        run: npm run build

      - name: Guard tests (structural constraints)
        run: npm run test:guards

  # ── Gate 2: テスト + カバレッジ + Storybook（fast-gate 後に並列） ──
  test-coverage:
    needs: [wasm-build, fast-gate]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: wasm

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: Test with coverage
        run: npx vitest run --coverage

      - name: Upload coverage on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage
          retention-days: 7

      # test-coverage でも build を回すのは、fast-gate とは別の依存状態で
      # ビルドが通ることを確認するため（意図的な重複）
      - name: Type check & Build
        run: npm run build

      - name: Storybook build
        run: npm run build-storybook
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

  # ── Gate 3: E2E テスト（fast-gate 後に並列、matrix で分割） ──
  e2e:
    needs: [wasm-build, fast-gate]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, mobile-chrome]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: wasm

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('app/package-lock.json') }}

      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      # matrix で chromium / mobile-chrome を分割し、モバイル系の崩れを検出する
      - name: E2E tests (${{ matrix.project }})
        run: npx playwright test --project=${{ matrix.project }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: app/playwright-report
          retention-days: 7

  # ── Pages ビルド（main push のみ、全ゲート通過後） ──────────
  # VITE_JMA_PROXY_URL を含む本番条件での再ビルド（意図的な重複）
  pages-build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [fast-gate, test-coverage, e2e]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: wasm

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: Production build
        run: npm run build
        env:
          VITE_JMA_PROXY_URL: ${{ secrets.VITE_JMA_PROXY_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  # ── Pages デプロイ（main push のみ） ──────────────────────
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: pages-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
