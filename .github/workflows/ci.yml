name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── WASM ビルド（1回だけ、artifact で後続に配布） ──────────
  # pkg/ は Cargo.toml/Cargo.lock/src/** + setup-wasm action のハッシュで cache。
  # WASM 未変更時は setup-wasm（Rust toolchain install + cargo install + build:wasm）
  # を丸ごとスキップして、cache restore のみで pkg/ を復元する。
  wasm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: wasm-pkg-cache
        uses: actions/cache@v4
        with:
          path: |
            wasm/*/pkg
          key: wasm-pkg-v1-${{ runner.os }}-${{ hashFiles('wasm/*/Cargo.toml', 'wasm/*/Cargo.lock', 'wasm/*/src/**', '.github/actions/setup-wasm/action.yml') }}
      - if: steps.wasm-pkg-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-wasm
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: wasm/**/pkg
          retention-days: 1

  # ── Gate 1: 高速ゲート（lint + format + build + guard テスト） ──
  fast-gate:
    needs: wasm-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
        with:
          # Phase K Option 1 (AR-CONTENT-SPEC-LAST-SOURCE-COMMIT): contentSpecLastSourceCommitGuard が
          # `git log -1 --format=%H -- <sourceRef>` で source の最新 commit hash を解決するため、
          # 全 commit history が必要。shallow clone (depth=1) では merge commit のみが返って常に hard fail する。
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: wasm

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check & Build
        run: npm run build

      - name: Guard tests (structural constraints)
        run: npm run test:guards

  # ── Gate 1.5: docs-health（fast-gate 後に並列 — 生成差分検出 + health 判定） ──
  docs-health:
    needs: [wasm-build, fast-gate]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
        with:
          # contentSpecLastSourceCommitGuard が `git log -1` で source の commit hash を解決するため必須。
          # 詳細: fast-gate 同 step のコメント参照
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: wasm

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: Build (for bundle size collection)
        run: |
          START=$(date +%s)
          npm run build
          echo "HEALTH_BUILD_SECONDS=$(( $(date +%s) - START ))" >> "$GITHUB_ENV"

      - name: Guard tests (timing capture)
        run: |
          START=$(date +%s)
          npm run test:guards
          echo "HEALTH_GUARDS_SECONDS=$(( $(date +%s) - START ))" >> "$GITHUB_ENV"

      - name: Docs check (generated freshness + health gate)
        run: npm run docs:check

  # ── Gate 1.6: Content Spec PR Impact Report（PR のみ、fast-gate 後に並列） ──
  # base..head の source 変更から影響 spec を機械列挙し、risk level 付きで artifact 保存。
  # 実装: tools/widget-specs/impact.mjs / npm run content-specs:impact
  # plan: projects/phased-content-specs-rollout/plan.md §Phase I
  content-specs-impact:
    if: github.event_name == 'pull_request'
    needs: [fast-gate]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # base ref との diff に必要

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: Generate impact report (markdown)
        run: |
          BASE_REF=origin/${{ github.base_ref }}
          npm run content-specs:impact -- --base "$BASE_REF" --head HEAD > /tmp/impact.md || EXIT=$?
          echo "Exit code: ${EXIT:-0}"
          # exit code 0=no impact / 1=impact detected (artifact 保存対象) / 2=error
          if [ "${EXIT:-0}" = "2" ]; then exit 2; fi

      - name: Generate impact report (JSON)
        run: |
          BASE_REF=origin/${{ github.base_ref }}
          npm run content-specs:impact -- --base "$BASE_REF" --head HEAD --json > /tmp/impact.json || true

      - name: Upload impact report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: content-specs-impact
          path: |
            /tmp/impact.md
            /tmp/impact.json
          retention-days: 14

      - name: Show impact summary in job log
        run: cat /tmp/impact.md

  # ── Gate 2: テスト + カバレッジ + Storybook（fast-gate 後に並列） ──
  test-coverage:
    needs: [wasm-build, fast-gate]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
        with:
          # vitest 全実行が contentSpecLastSourceCommitGuard を含むため `git log` の full history が必要。
          # 詳細: fast-gate 同 step のコメント参照
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: wasm

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: Test with coverage
        run: npx vitest run --coverage

      - name: Upload coverage on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage
          retention-days: 7

      # test-coverage でも build を回すのは、fast-gate とは別の依存状態で
      # ビルドが通ることを確認するため（意図的な重複）
      - name: Type check & Build
        run: npm run build

      - name: Storybook build
        run: npm run build-storybook
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

  # ── Gate 3: E2E テスト（fast-gate 後に並列、matrix で分割） ──
  e2e:
    needs: [wasm-build, fast-gate]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, mobile-chrome]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: wasm

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('app/package-lock.json') }}

      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      # matrix で chromium / mobile-chrome を分割し、モバイル系の崩れを検出する
      - name: E2E tests (${{ matrix.project }})
        run: npx playwright test --project=${{ matrix.project }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: app/playwright-report
          retention-days: 7

  # ── Pages ビルド（main push のみ、全ゲート通過後） ──────────
  # VITE_JMA_PROXY_URL を含む本番条件での再ビルド（意図的な重複）
  pages-build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [fast-gate, docs-health, test-coverage, e2e]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: wasm

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: Production build
        run: npm run build
        env:
          VITE_BASE_PATH: '/${{ github.event.repository.name }}/'
          VITE_JMA_PROXY_URL: ${{ secrets.VITE_JMA_PROXY_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  # ── Pages デプロイ（main push のみ） ──────────────────────
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: pages-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
