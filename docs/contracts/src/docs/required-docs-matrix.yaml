# Required Docs Matrix authoring source (Wave 3 / Phase 7 sub-PR 1 = stage: pre-articulate)
#
# 役割: repo 構造から必要 doc を導出する matrix。target-type ごとに pathPattern + requiredDocs +
# rationale を articulate。consumer = check-required-docs.mjs が repo を scan + matrix 経由で
# missing doc finding を articulate (= advisory only、不可侵原則 11 整合)。
#
# 機械正本: docs/contracts/generated/required-docs-matrix.generated.json
# (Wave 3 / Phase 7 sub-PR 1 で generator landing 後に生成)。
#
# 不可侵 (ADR-SCP-021 + plan.md Wave 3 / Phase 7 完了条件 + 不可侵原則 11 整合):
# - 初期は advisory + new-only gate のみ foul (= 既存 missing は baseline、新規追加 path で missing が
#   増える場合のみ warning)
# - pre-write 強制機構は実装しない (= AI session の自由度確保)
# - exceptions list で governance-articulated 例外を明示 (= 例: collection mode project)
# - cross-reference: 各 docKind は ai-doc-template-rules.yaml の kind と意味的に一致
#
# 出典: plan.md Wave 3 / Phase 7 検査対象 list (= feature-slice / wasm-module / active project /
# source-layer) を pre-articulate landing。
#
# schema: docs/contracts/schema/required-docs-matrix.schema.json (本 sub-PR で landing)

schemaVersion: required-docs-matrix-v1
stage: pre-articulate

rules:
  - targetType: active-project
    pathPattern: projects/active/<id>/
    requiredDocs:
      - docPath: projects/active/{{id}}/AI_CONTEXT.md
        docKind: project-plan
      - docPath: projects/active/{{id}}/HANDOFF.md
        docKind: project-plan
      - docPath: projects/active/{{id}}/plan.md
        docKind: project-plan
      - docPath: projects/active/{{id}}/checklist.md
        docKind: project-checklist
      - docPath: projects/active/{{id}}/projectization.md
        docKind: project-projectization
        optional: true
      - docPath: projects/active/{{id}}/config/project.json
        docKind: canonical-doc
    rationale: |
      project-checklist-governance §3 + projectization-policy.md で active project の必須セット 6 が
      articulate されている (= AI_CONTEXT + HANDOFF + plan + checklist + projectization + config)。
      projectization.md は collection mode (= kind: collection) では不要 (= projectization-policy
      §11 + PZ-1 guard exception 整合) のため optional articulate (= advisory only)。
      projectizationPolicyGuard PZ-1 + PZ-13 + PZ-14 が機械検証済 (= 既存 guard との重複 articulate、
      本 matrix は cross-doc visibility 提供)。
    exceptions: []

  - targetType: feature-slice
    pathPattern: app/src/features/<feature>/
    requiredDocs:
      - docPath: app/src/features/{{feature}}/README.md
        docKind: canonical-doc
        optional: true
    rationale: |
      app/src/features/ 配下の縦スライス (= 13 features articulate 済、CLAUDE.md project structure
      整合) は将来 feature-contract doc を要求する candidate。Phase 7 では README.md を optional
      articulate (= 既存 13 features に大半 README.md なし、advisory のみ)。Wave 3 後段の別 sub-PR で
      'feature-contract' doc kind の追加 + 全 feature 必須化を判断。
    exceptions:
      - app/src/features/shared/

  - targetType: wasm-module
    pathPattern: wasm/<module>/
    requiredDocs:
      - docPath: wasm/{{module}}/README.md
        docKind: canonical-doc
        optional: true
    rationale: |
      wasm/ 配下の各 module (= ~10+ modules articulate 済) は calculation-contract + parity-policy
      doc の候補。Phase 7 では README.md を optional articulate (= 既存 module の README 状態未確認、
      advisory のみ)。Wave 3 後段の別 sub-PR で 'wasm-module-contract' doc kind の追加 + 必須化判断。
    exceptions: []

  - targetType: roles-role
    pathPattern: roles/<tier>/<role>/
    requiredDocs:
      - docPath: roles/{{tier}}/{{role}}/ROLE.md
        docKind: role-identity
      - docPath: roles/{{tier}}/{{role}}/SKILL.md
        docKind: role-skill
    rationale: |
      CLAUDE.md 4 層 governance model + Wave 2 Reading Pass Batch 16 articulate 済: 各 role は
      ROLE.md (Identity) + SKILL.md (Execution) の pair で governance contract を構成。pair の片方
      だけでは不完全。本 matrix で機械的整合性 articulate。
    exceptions:
      # specialist tier は 1 階層深い (= roles/line/specialist/<role>/) ので、
      # pathPattern <tier>/<role>/ で 'specialist' を role と誤検出する → exceptions で除外
      # 実 specialist roles は 別 rule (roles-specialist) で articulate
      - roles/line/specialist

  - targetType: roles-specialist
    pathPattern: roles/line/specialist/<role>/
    requiredDocs:
      - docPath: roles/line/specialist/{{role}}/ROLE.md
        docKind: role-identity
      - docPath: roles/line/specialist/{{role}}/SKILL.md
        docKind: role-skill
    rationale: |
      roles/line/specialist/ は line tier の sub-tier (= duckdb-specialist / explanation-steward /
      invariant-guardian の 3 specialist roles)。roles-role rule は <tier>/<role>/ の 2 階層 pattern
      で specialist を role と誤検出するため、specialist 用に独立 rule articulate。各 specialist
      role も ROLE.md + SKILL.md pair で governance contract を構成 (= roles-role と同 governance)。
    exceptions: []
